services:
  - type: web
    name: nutriscan-api
    runtime: python
    pythonVersion: "3.12"
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # you paste this in Render dashboard
